; PlatformIO Project Configuration File
; STM32G431 Flight Controller Project

[env:genericSTM32G431CB]
platform = ststm32
board = genericSTM32G431CB
framework = stm32cube

; 上传方式 (DFU模式，需要按住BOOT按钮上电)
upload_protocol = dfu

; 编译优化 (最高性能)
build_flags = 
    -O3
    -DSTM32G431xx
    -DUSE_HAL_DRIVER
    -I include
    -ffast-math
    -funroll-loops
    -ffunction-sections
    -fdata-sections
    -DARM_MATH_CM4
    -D__FPU_PRESENT=1
    -Wl,-u,_printf_float

; 开启浮点printf支持
build_unflags = -specs=nano.specs

; 注意: CMSIS-DSP 使用内置实现 (fft_notch.c), 无需外部库

lib_extra_dirs = lib

; 串口监视器
monitor_speed = 9600
monitor_port = auto
